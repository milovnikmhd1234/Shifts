<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP / LED Panely</title>

<!-- DOT MATRIX FONT -->
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:'DotGothic16', monospace;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:300px;
    background:#0b0f0b;
    border-right:1px solid #222;
    padding:10px;
}

input, textarea{
    width:100%;
    margin-top:6px;
    padding:6px;
    background:black;
    color:#00ff66;
    border:1px solid #333;
    font-family:'DotGothic16', monospace;
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    background:#111;
    color:#00ff66;
    border:1px solid #333;
    cursor:pointer;
}

/* MAIN PANEL */
.main{
    flex:1;
    padding:10px;
}

/* CANVAS DISPLAY */
canvas{
    background:black;
    border:1px solid #222;
}

/* LED LIST */
.marquee{
    margin-top:10px;
    overflow:hidden;
    border:1px solid #222;
    padding:6px;
}

.marquee span{
    display:inline-block;
    white-space:nowrap;
    animation:move 8s linear infinite;
}

@keyframes move{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}

/* glow efekt */
.glow{
    text-shadow:0 0 8px #00ff66;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>🟢 DP Ovládání</h3>

<input id="liveText" placeholder="LIVE text (hned se zobrazí)">
<button onclick="downloadPNG()">⬇ PNG export</button>

<hr>

<h3>🎞️ Animované linky</h3>

<textarea id="animInput" placeholder="formát:
213;Krnov → Opava;Krnov;Bruntál;Opava"></textarea>

<button onclick="addPanel()">Přidat panel</button>

<div id="panelList"></div>
</div>

<!-- MAIN -->
<div class="main">

<h2 class="glow">🚌 LED / DP PANEL SYSTEM</h2>

<canvas id="c" width="750" height="400"></canvas>

<div id="liveOut" class="marquee glow">
    <span>čekám na data...</span>
</div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let liveText = "";
let panels = [];

/* LIVE INPUT */
document.getElementById("liveText").addEventListener("input", (e)=>{
    liveText = e.target.value;

    document.getElementById("liveOut").innerHTML =
        `<span>${liveText || "..."}</span>`;

    draw();
});

/* DRAW LED DISPLAY */
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // LED GRID
    ctx.fillStyle="#003300";
    for(let x=0;x<canvas.width;x+=12){
        for(let y=0;y<canvas.height;y+=12){
            ctx.fillRect(x,y,1,1);
        }
    }

    // TEXT glow
    ctx.shadowColor="#00ff66";
    ctx.shadowBlur=12;
    ctx.fillStyle="#00ff66";
    ctx.font="28px DotGothic16";

    ctx.fillText(liveText, 20, 60);

    ctx.shadowBlur=0;
}

/* PNG EXPORT */
function downloadPNG(){
    const link = document.createElement("a");
    link.download = "dp_panel.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

/* ANIM PANELS */
function addPanel(){

    const raw = document.getElementById("animInput").value;
    const parts = raw.split(";");

    if(parts.length < 3){
        alert("Špatný formát!");
        return;
    }

    const obj = {
        line: parts[0],
        direction: parts[1],
        stops: parts.slice(2)
    };

    panels.push(obj);
    renderPanels();
}

function renderPanels(){

    const div = document.getElementById("panelList");
    div.innerHTML = "";

    panels.forEach(p=>{

        const el = document.createElement("div");
        el.className="marquee glow";

        el.innerHTML =
        `<span>🚌 ${p.line} | ${p.direction} | ${p.stops.join(" → ")}</span>`;

        div.appendChild(el);
    });
}

/* INIT */
draw();

</script>

</body>
</html>
