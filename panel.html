<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP Panel GIF Export</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:'Press Start 2P', monospace;
    display:flex;
}

.sidebar{
    width:320px;
    padding:10px;
    background:#0b0f0b;
    border-right:1px solid #222;
}

input, textarea{
    width:100%;
    margin-top:6px;
    padding:6px;
    background:black;
    color:#00ff66;
    border:1px solid #333;
    font-family:'Press Start 2P';
    font-size:10px;
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    background:#111;
    color:#00ff66;
    border:1px solid #333;
    cursor:pointer;
    font-family:'Press Start 2P';
    font-size:10px;
}

.main{
    flex:1;
    padding:10px;
}

canvas{
    background:black;
    border:1px solid #222;
}

.panel{
    margin-top:10px;
    border:1px solid #222;
    height:30px;
    overflow:hidden;
    position:relative;
}

.scroll{
    position:absolute;
    white-space:nowrap;
    animation:scroll 6s linear infinite;
}

@keyframes scroll{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div class="sidebar">

<h3>🟢 DP PANEL</h3>

<input id="liveText" placeholder="LIVE text">

<button onclick="downloadPNG()">⬇ PNG</button>
<button onclick="exportGIF()">🎞 GIF export</button>

<hr>

<h4>🎞 Animace</h4>

<textarea id="animInput" placeholder="213;Krnov → Opava;Krnov;Bruntál;Opava"></textarea>

<button onclick="addPanel()">Přidat</button>

</div>

<div class="main">

<canvas id="c" width="800" height="400"></canvas>

<div id="liveOut" class="panel">
    <div class="scroll">čekám...</div>
</div>

</div>

<!-- GIF.JS -->
<script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let liveText = "";
let panels = [];

/* LIVE INPUT */
document.getElementById("liveText").addEventListener("input",(e)=>{
    liveText = e.target.value;
    document.querySelector(".scroll").innerText = liveText;
    draw();
});

/* DRAW */
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // grid LED
    ctx.fillStyle="#003300";
    for(let x=0;x<canvas.width;x+=10){
        for(let y=0;y<canvas.height;y+=10){
            ctx.fillRect(x,y,1,1);
        }
    }

    // text
    ctx.fillStyle="#00ff66";
    ctx.font="22px 'Press Start 2P'";
    ctx.shadowColor="#00ff66";
    ctx.shadowBlur=10;
    ctx.fillText(liveText,20,60);
    ctx.shadowBlur=0;
}

/* PNG */
function downloadPNG(){
    const a = document.createElement("a");
    a.download="panel.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
}

/* ANIM PANELS */
function addPanel(){
    const p = document.getElementById("animInput").value.split(";");

    if(p.length < 3){
        alert("Špatný formát");
        return;
    }

    panels.push({
        line:p[0],
        dir:p[1],
        stops:p.slice(2)
    });

    renderPanels();
}

function renderPanels(){
    const main = document.querySelector(".main");

    panels.forEach(p=>{
        const div = document.createElement("div");
        div.className="panel";
        div.innerHTML =
        `<div class="scroll">
        🚌 ${p.line} | ${p.dir} | ${p.stops.join(" → ")}
        </div>`;
        main.appendChild(div);
    });
}

/* ===== REAL GIF EXPORT ===== */
function exportGIF(){

    const gif = new GIF({
        workers: 2,
        quality: 10,
        width: canvas.width,
        height: canvas.height
    });

    let frames = 20;
    let i = 0;

    function captureFrame(){

        ctx.clearRect(0,0,canvas.width,canvas.height);
        draw();

        ctx.fillStyle="#00ff66";
        ctx.font="22px Press Start 2P";

        // animace pohybu textu
        let offset = i * 10;
        ctx.fillText(liveText + "   ", 20 - offset, 120);

        gif.addFrame(ctx, {copy:true, delay:100});

        i++;

        if(i < frames){
            captureFrame();
        } else {
            gif.on('finished', function(blob){
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "dp_panel.gif";
                a.click();
            });

            gif.render();
        }
    }

    captureFrame();
}

draw();

</script>

</body>
</html>
