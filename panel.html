<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHD DP PANEL FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    display:flex;
    background:black;
    color:#00ff66;
    font-family:'Press Start 2P', monospace;
}

.sidebar{
    width:340px;
    background:#0b0f0b;
    border-right:1px solid #222;
    padding:10px;
}

input, textarea{
    width:100%;
    margin-top:6px;
    padding:6px;
    background:black;
    color:#00ff66;
    border:1px solid #333;
    font-family:'Press Start 2P';
    font-size:10px;
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    background:#111;
    color:#00ff66;
    border:1px solid #333;
    cursor:pointer;
    font-family:'Press Start 2P';
    font-size:10px;
}

.main{
    flex:1;
    padding:10px;
}

canvas{
    background:black;
    border:1px solid #222;
}
</style>
</head>

<body>

<div class="sidebar">

<h3>🚌 DP PANEL</h3>

<input id="line" placeholder="Linka">
<input id="dir" placeholder="Směr">
<textarea id="stops" placeholder="Krnov;Bruntál;Opava"></textarea>

<input id="speed" type="number" placeholder="Speed">

<input id="duration" type="number" placeholder="Video délka (sekundy)" value="5">

<button onclick="setData()">➕ Nastavit</button>

<button onclick="downloadPNG()">⬇ PNG</button>
<button onclick="exportMP4()">🎞 MP4 export</button>

</div>

<div class="main">
<canvas id="c" width="900" height="450"></canvas>
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let data = null;
let t = 0;

/* SET DATA */
function setData(){
    data = {
        line: line.value || "0",
        dir: dir.value || "",
        stops: stops.value.split(";"),
        speed: parseInt(speed.value) || 5
    };

    draw();
}

/* DRAW PANEL */
function draw(offset=0){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // PANEL AREA
    ctx.fillStyle="black";
    ctx.fillRect(120,120,700,200);

    // DOT MATRIX GRID
    ctx.fillStyle="#002200";
    for(let x=120;x<820;x+=10){
        for(let y=120;y<320;y+=10){
            ctx.fillRect(x,y,1,1);
        }
    }

    if(!data){
        ctx.fillStyle="#00ff66";
        ctx.font="18px Press Start 2P";
        ctx.fillText("NAČTI DATA",140,200);
        return;
    }

    const text =
    `${data.line} | ${data.dir} | ${data.stops.join(" → ")}`;

    ctx.fillStyle="#00ff66";
    ctx.shadowColor="#00ff66";
    ctx.shadowBlur=10;
    ctx.font="18px Press Start 2P";

    ctx.fillText(text, 140 - offset, 200);

    ctx.shadowBlur=0;
}

/* LOOP */
function loop(){
    t++;
    draw(t % 300);
    requestAnimationFrame(loop);
}
loop();

/* PNG EXPORT (FIXED) */
function downloadPNG(){

    if(!data){
        alert("Nejsou data!");
        return;
    }

    const temp = document.createElement("canvas");
    temp.width = 700;
    temp.height = 200;

    const tctx = temp.getContext("2d");

    // redraw panel přesně
    tctx.fillStyle="black";
    tctx.fillRect(0,0,temp.width,temp.height);

    tctx.fillStyle="#00ff66";
    tctx.font="18px Press Start 2P";

    const text =
    `${data.line} | ${data.dir} | ${data.stops.join(" → ")}`;

    tctx.fillText(text,20,100);

    const a = document.createElement("a");
    a.download="mhd_panel.png";
    a.href=temp.toDataURL("image/png");
    a.click();
}

/* MP4 EXPORT (REAL via ffmpeg.wasm) */
async function exportMP4(){

    if(!data){
        alert("Nejsou data!");
        return;
    }

    alert("MP4 se renderuje... může trvat pár sekund 😄");

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, {
        mimeType: "video/webm"
    });

    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async () => {

        const webmBlob = new Blob(chunks, {type:"video/webm"});

        // ===== KONVERZE NA MP4 =====
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });

        await ffmpeg.load();

        ffmpeg.FS('writeFile', 'input.webm', await fetchFile(webmBlob));

        await ffmpeg.run(
            '-i', 'input.webm',
            '-c:v', 'libx264',
            '-pix_fmt', 'yuv420p',
            'output.mp4'
        );

        const data = ffmpeg.FS('readFile', 'output.mp4');

        const mp4Blob = new Blob([data.buffer], {type:'video/mp4'});

        const a = document.createElement("a");
        a.href = URL.createObjectURL(mp4Blob);
        a.download = "mhd_panel.mp4";
        a.click();
    };

    recorder.start();

    let sec = parseInt(document.getElementById("duration").value) || 5;

    setTimeout(()=>{
        recorder.stop();
    }, sec * 1000);
}

</script>

<!-- FFmpeg WASM -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

</body>
</html>
