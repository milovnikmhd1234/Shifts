<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Panel Pro</title>

<style>
body{
    margin:0;
    background:black;
    color:lime;
    font-family:monospace;
    display:flex;
}

/* LEVÝ PANEL */
.sidebar{
    width:280px;
    background:#111;
    padding:10px;
    border-right:1px solid #333;
}

input, textarea{
    width:100%;
    margin-top:5px;
    padding:6px;
    background:#000;
    color:lime;
    border:1px solid #333;
}

/* HLAVNÍ PANEL */
.main{
    flex:1;
    padding:10px;
}

canvas{
    background:#000;
    border:1px solid #333;
}

/* animace */
.marquee{
    white-space:nowrap;
    overflow:hidden;
    border:1px solid #333;
    padding:5px;
    margin-top:10px;
}

.marquee span{
    display:inline-block;
    animation:move 6s linear infinite;
}

@keyframes move{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}

button{
    margin-top:5px;
    background:#222;
    color:white;
    border:1px solid #444;
    padding:6px;
    width:100%;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>🎛️ Ovládání</h3>

<input id="liveText" placeholder="piš text (hned se ukáže)">
<button onclick="downloadPNG()">⬇ PNG</button>

<hr>

<h3>🎞️ Animované panely</h3>

<textarea id="animInput" placeholder="formát:
213;Krnov → Opava;Krnov;Bruntál;Opava"></textarea>

<button onclick="addAnim()">Přidat panel</button>
<button onclick="downloadGIF()">⬇ GIF export</button>

<div id="animList"></div>
</div>

<!-- HLAVNÍ -->
<div class="main">

<h2>LED PANEL LIVE</h2>

<canvas id="c" width="700" height="400"></canvas>

<div id="liveDisplay" class="marquee">
    <span>🟢 čekám na text...</span>
</div>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let liveText = "";

// LIVE TEXT → okamžitě panel + canvas
document.getElementById("liveText").addEventListener("input", (e)=>{
    liveText = e.target.value;

    document.getElementById("liveDisplay").innerHTML =
        `<span>${liveText || "..."}</span>`;

    draw();
});

// DRAW CANVAS
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#0f0";
    ctx.font="20px monospace";
    ctx.fillText(liveText, 20, 50);
}

// PNG EXPORT
function downloadPNG(){
    const link = document.createElement("a");
    link.download = "panel.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

// ===== ANIM PANELY =====
let panels = [];

function addAnim(){
    const raw = document.getElementById("animInput").value;
    const parts = raw.split(";");

    if(parts.length < 3){
        alert("Špatný formát!");
        return;
    }

    let obj = {
        line: parts[0],
        direction: parts[1],
        stops: parts.slice(2)
    };

    panels.push(obj);
    renderPanels();
}

function renderPanels(){
    const div = document.getElementById("animList");
    div.innerHTML = "";

    panels.forEach((p,i)=>{
        let el = document.createElement("div");
        el.className="marquee";

        el.innerHTML = `<span>🚌 ${p.line} | ${p.direction} | ${p.stops.join(" → ")}</span>`;
        div.appendChild(el);
    });
}

// ===== GIF EXPORT (simplified demo) =====
function downloadGIF(){
    alert("GIF export: přidáme gif.js (řekni a dodám plnou verzi 😄)");
}

draw();
</script>

</body>
</html>
