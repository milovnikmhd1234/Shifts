<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHD DP Panel System</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    display:flex;
    background:black;
    color:#00ff66;
    font-family:'Press Start 2P', monospace;
}

/* SIDEBAR */
.sidebar{
    width:340px;
    background:#0b0f0b;
    border-right:1px solid #222;
    padding:10px;
}

input, textarea, select{
    width:100%;
    margin-top:6px;
    padding:6px;
    background:black;
    color:#00ff66;
    border:1px solid #333;
    font-family:'Press Start 2P';
    font-size:10px;
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    background:#111;
    color:#00ff66;
    border:1px solid #333;
    cursor:pointer;
    font-family:'Press Start 2P';
    font-size:10px;
}

/* MAIN */
.main{
    flex:1;
    padding:10px;
}

canvas{
    background:black;
    border:1px solid #222;
}

/* anim container */
.panelBox{
    margin-top:10px;
    border:1px solid #222;
    overflow:hidden;
    height:30px;
    position:relative;
}

.scroll{
    position:absolute;
    white-space:nowrap;
    animation:move linear infinite;
}

@keyframes move{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h3>🚌 MHD PANEL SYSTEM</h3>

<input id="line" placeholder="Linka (např. 213)">
<input id="direction" placeholder="Směr (Krnov → Opava)">
<textarea id="stops" placeholder="Krnov;Bruntál;Opava"></textarea>

<input id="speed" type="number" placeholder="speed (např. 8 = rychlost)">

<button onclick="addRoute()">➕ Přidat linku</button>

<button onclick="downloadPNG()">⬇ PNG</button>
<button onclick="exportGIF()">🎞 GIF</button>

<div id="list"></div>

</div>

<!-- MAIN -->
<div class="main">

<canvas id="c" width="850" height="450"></canvas>

<div id="live" class="panelBox">
    <div class="scroll">čekám na data...</div>
</div>

</div>

<script src="https://unpkg.com/gif.js.optimized/dist/gif.js"></script>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let routes = [];
let activeText = "";

/* ADD ROUTE */
function addRoute(){

    const line = document.getElementById("line").value;
    const dir = document.getElementById("direction").value;
    const stops = document.getElementById("stops").value.split(";");
    const speed = parseInt(document.getElementById("speed").value) || 6;

    if(!line || !dir || stops.length < 2){
        alert("Vyplň vše!");
        return;
    }

    routes.push({line, dir, stops, speed});
    renderList();
}

/* LIST */
function renderList(){

    const div = document.getElementById("list");
    div.innerHTML = "";

    routes.forEach(r=>{

        const el = document.createElement("div");
        el.className="panelBox";

        const text =
        `🚌 ${r.line} | ${r.dir} | ${r.stops.join(" → ")}`;

        el.innerHTML = `<div class="scroll" style="animation-duration:${r.speed}s">${text}</div>`;

        div.appendChild(el);
    });
}

/* DRAW DP DISPLAY */
function draw(text){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // LED GRID
    ctx.fillStyle="#002200";
    for(let x=0;x<canvas.width;x+=10){
        for(let y=0;y<canvas.height;y+=10){
            ctx.fillRect(x,y,1,1);
        }
    }

    // TEXT
    ctx.fillStyle="#00ff66";
    ctx.shadowColor="#00ff66";
    ctx.shadowBlur=10;
    ctx.font="26px 'Press Start 2P'";

    ctx.fillText(text || "DP SYSTEM READY", 20, 80);

    ctx.shadowBlur=0;
}

/* PNG */
function downloadPNG(){
    const a = document.createElement("a");
    a.download="mhd_panel.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
}

/* GIF EXPORT (REAL) */
function exportGIF(){

    const gif = new GIF({
        workers:2,
        quality:10,
        width:canvas.width,
        height:canvas.height,
        workerScript:"https://unpkg.com/gif.js.optimized/dist/gif.worker.js"
    });

    let frames = 25;

    for(let i=0;i<frames;i++){

        let offset = i * 10;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // grid
        ctx.fillStyle="#002200";
        for(let x=0;x<canvas.width;x+=10){
            for(let y=0;y<canvas.height;y+=10){
                ctx.fillRect(x,y,1,1);
            }
        }

        ctx.fillStyle="#00ff66";
        ctx.font="26px Press Start 2P";
        ctx.shadowBlur=10;

        let txt =
        routes[0]
        ? `${routes[0].line} | ${routes[0].dir} | ${routes[0].stops.join(" → ")}`
        : "MHD PANEL";

        ctx.fillText(txt, 20 - offset, 100);

        gif.addFrame(ctx, {copy:true, delay:80});
    }

    gif.on("finished", function(blob){
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "mhd_panel.gif";
        a.click();
    });

    gif.render();
}

/* START */
draw();

</script>

</body>
</html>
