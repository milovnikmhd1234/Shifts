<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHD DP Panel System</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    display:flex;
    background:black;
    color:#00ff66;
    font-family:'Press Start 2P', monospace;
}

.sidebar{
    width:340px;
    background:#0b0f0b;
    border-right:1px solid #222;
    padding:10px;
}

input, textarea{
    width:100%;
    margin-top:6px;
    padding:6px;
    background:black;
    color:#00ff66;
    border:1px solid #333;
    font-family:'Press Start 2P';
    font-size:10px;
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    background:#111;
    color:#00ff66;
    border:1px solid #333;
    cursor:pointer;
    font-family:'Press Start 2P';
    font-size:10px;
}

.main{
    flex:1;
    padding:10px;
}

canvas{
    background:black;
    border:1px solid #222;
}
</style>
</head>

<body>

<div class="sidebar">

<h3>🚌 DP PANEL</h3>

<input id="line" placeholder="Linka (213)">
<input id="dir" placeholder="Směr (Krnov → Opava)">
<textarea id="stops" placeholder="Krnov;Bruntál;Opava"></textarea>
<input id="speed" type="number" placeholder="Speed (1–10)">

<hr>

<h4>🎬 Export nastavení</h4>
<input id="duration" type="number" placeholder="Délka videa (sekundy)" value="5">

<button onclick="setData()">➕ Nastavit / aktualizovat</button>

<button onclick="downloadPNG()">⬇ PNG (jen panel)</button>
<button onclick="exportVideo()">🎞 MP4 / WebM export</button>

</div>

<div class="main">
<canvas id="c" width="900" height="450"></canvas>
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let data = null;
let t = 0;

/* SET DATA */
function setData(){

    data = {
        line: line.value || "0",
        dir: dir.value || "",
        stops: stops.value.split(";"),
        speed: parseInt(speed.value) || 5
    };
}

/* DRAW DP PANEL */
function draw(offset=0){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // PANEL AREA
    ctx.fillStyle="black";
    ctx.fillRect(120,100,700,220);

    // DOT MATRIX GRID
    ctx.fillStyle="#002200";
    for(let x=120;x<820;x+=10){
        for(let y=100;y<320;y+=10){
            ctx.fillRect(x,y,1,1);
        }
    }

    if(!data){
        ctx.fillStyle="#00ff66";
        ctx.font="18px Press Start 2P";
        ctx.fillText("NAČTI DATA",140,180);
        return;
    }

    const text =
    `${data.line} | ${data.dir} | ${data.stops.join(" → ")}`;

    ctx.fillStyle="#00ff66";
    ctx.shadowColor="#00ff66";
    ctx.shadowBlur=10;
    ctx.font="18px Press Start 2P";

    ctx.fillText(text, 140 - offset, 180);

    ctx.shadowBlur=0;
}

/* ANIMATION LOOP */
function loop(){
    t++;
    draw(t % 300);
    requestAnimationFrame(loop);
}
loop();

/* PNG EXPORT (ONLY PANEL AREA) */
function downloadPNG(){

    const temp = document.createElement("canvas");
    temp.width = 700;
    temp.height = 220;

    const tctx = temp.getContext("2d");

    tctx.drawImage(
        canvas,
        120,100,700,220,
        0,0,700,220
    );

    const a = document.createElement("a");
    a.download = "mhd_panel.png";
    a.href = temp.toDataURL("image/png");
    a.click();
}

/* VIDEO EXPORT (USER DEFINED DURATION) */
function exportVideo(){

    const stream = canvas.captureStream(30);

    const recorder = new MediaRecorder(stream, {
        mimeType: "video/webm"
    });

    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = () => {
        const blob = new Blob(chunks, {type:"video/webm"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "mhd_panel.webm";
        a.click();
    };

    recorder.start();

    // ===== USER DURATION =====
    let sec = parseInt(document.getElementById("duration").value) || 5;

    setTimeout(()=>{
        recorder.stop();
    }, sec * 1000);
}

</script>

</body>
</html>
