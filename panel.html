<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHD DP DOT MATRIX PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    display:flex;
    background:black;
    color:#00ff66;
    font-family:'Press Start 2P', monospace;
}

/* SIDEBAR */
.sidebar{
    width:340px;
    background:#0b0f0b;
    border-right:1px solid #222;
    padding:10px;
}

input, textarea{
    width:100%;
    margin-top:6px;
    padding:6px;
    background:black;
    color:#00ff66;
    border:1px solid #333;
    font-family:'Press Start 2P';
    font-size:10px;
}

button{
    width:100%;
    margin-top:6px;
    padding:8px;
    background:#111;
    color:#00ff66;
    border:1px solid #333;
    cursor:pointer;
    font-family:'Press Start 2P';
    font-size:10px;
}

/* MAIN */
.main{
    flex:1;
    padding:10px;
}

canvas{
    background:black;
    border:1px solid #222;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h3>🚌 MHD DP PANEL</h3>

<input id="line" placeholder="Linka (213)">
<input id="direction" placeholder="Směr (Krnov → Opava)">
<textarea id="stops" placeholder="Krnov;Bruntál;Opava"></textarea>
<input id="speed" type="number" placeholder="speed (1–10)">

<button onclick="addRoute()">➕ Přidat / aktualizovat</button>

<button onclick="downloadPNG()">⬇ PNG</button>
<button onclick="exportGIF()">🎞 GIF</button>

</div>

<!-- MAIN -->
<div class="main">
<canvas id="c" width="900" height="450"></canvas>
</div>

<script src="https://unpkg.com/gif.js.optimized/dist/gif.js"></script>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let route = null;
let frame = 0;

/* ADD / UPDATE ROUTE */
function addRoute(){

    route = {
        line: document.getElementById("line").value || "0",
        dir: document.getElementById("direction").value || "",
        stops: (document.getElementById("stops").value || "").split(";"),
        speed: parseInt(document.getElementById("speed").value) || 5
    };

    draw();
}

/* DOT MATRIX GRID */
function drawGrid(){

    ctx.fillStyle="#003300";

    for(let x=0;x<canvas.width;x+=10){
        for(let y=0;y<canvas.height;y+=10){
            ctx.fillRect(x,y,1,1);
        }
    }
}

/* RENDER PANEL */
function draw(offset=0){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawGrid();

    ctx.fillStyle="#00ff66";
    ctx.shadowColor="#00ff66";
    ctx.shadowBlur=10;
    ctx.font="26px 'Press Start 2P'";

    if(!route){
        ctx.fillText("NAČTI DATA...",20,80);
        return;
    }

    const text =
    `${route.line} | ${route.dir} | ${route.stops.join(" → ")}`;

    ctx.fillText(text, 20 - offset, 80);

    ctx.shadowBlur=0;
}

/* LIVE ANIMATION LOOP */
function animate(){
    frame++;
    draw(frame % 300);
    requestAnimationFrame(animate);
}
animate();

/* PNG EXPORT (100% WORKING) */
function downloadPNG(){
    const a = document.createElement("a");
    a.download="mhd_panel.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
}

/* GIF EXPORT (FIXED + STABLE) */
function exportGIF(){

    if(!route){
        alert("Nejsou data!");
        return;
    }

    const gif = new GIF({
        workers:2,
        quality:10,
        width:canvas.width,
        height:canvas.height,
        workerScript:"https://unpkg.com/gif.js.optimized/dist/gif.worker.js"
    });

    let frames = 25;

    for(let i=0;i<frames;i++){

        draw(i * 8);

        gif.addFrame(ctx, {
            copy:true,
            delay:80
        });
    }

    gif.on("finished", function(blob){
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "mhd_panel.gif";
        a.click();
    });

    gif.render();
}

</script>

</body>
</html>
