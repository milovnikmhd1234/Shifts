<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Panel</title>

<style>
body{
    margin:0;
    background:black;
    color:lime;
    font-family:monospace;
}

/* top bar */
.top{
    background:#111;
    padding:10px;
    color:white;
    display:flex;
    justify-content:space-between;
}

/* panel */
.panel{
    padding:10px;
}

/* canvas */
canvas{
    background:#000;
    border:1px solid #333;
    margin-top:10px;
}

/* buttons */
button{
    background:#222;
    color:white;
    border:1px solid #444;
    padding:8px;
    margin:5px;
}
</style>
</head>

<body>

<div class="top">
    <div>LED PANEL SYSTEM</div>
    <button onclick="window.location.href='index.html'">Zpět</button>
</div>

<div class="panel">

<h2>Interaktivní LED mapa</h2>

<input id="textInput" placeholder="např. 192 Krnov">
<button onclick="enableAdd()">Přidat bod</button>
<button onclick="clearPoints()">Vymazat</button>
<button onclick="downloadPNG()">Stáhnout PNG</button>

<br>

<canvas id="c" width="700" height="400"></canvas>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let addMode = false;
let points = [];

// zapnout režim přidání
function enableAdd(){
    addMode = true;
    alert("Klikni do panelu 🎯");
}

// klik do canvasu
canvas.addEventListener("click", (e)=>{
    if(!addMode) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const text = document.getElementById("textInput").value || "text";

    points.push({x,y,text});

    addMode = false;
    draw();
});

// vykreslení
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // TEČKY (grid)
    ctx.fillStyle = "#222";
    for(let x=0;x<canvas.width;x+=20){
        for(let y=0;y<canvas.height;y+=20){
            ctx.fillRect(x,y,2,2);
        }
    }

    // body
    for(let p of points){

        // bod
        ctx.fillStyle="lime";
        ctx.beginPath();
        ctx.arc(p.x,p.y,5,0,Math.PI*2);
        ctx.fill();

        // text
        ctx.fillStyle="white";
        ctx.font="14px monospace";
        ctx.fillText(p.text, p.x+8, p.y-8);
    }
}

// vymazat
function clearPoints(){
    points = [];
    draw();
}

// PNG download
function downloadPNG(){
    const link = document.createElement("a");
    link.download = "led-panel.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

// start
draw();
</script>

</body>
</html>
