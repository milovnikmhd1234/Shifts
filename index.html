<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHD Systém Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
}

/* LOGIN */
.login{
    max-width:350px;
    margin:80px auto;
    background:#12182b;
    padding:20px;
    border-radius:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#1c2440;
    color:white;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3a7bff;
    color:white;
}

/* APP */
.app{
    display:none;
    padding:10px;
}

.menu{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.card{
    background:#12182b;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <h2>Přihlášení</h2>
    <input id="user" placeholder="Uživatel">
    <input id="pass" type="password" placeholder="Heslo">
    <button onclick="login()">Přihlásit</button>
    <button onclick="register()">Registrovat</button>
</div>

<!-- APP -->
<div class="app" id="app">

    <div class="menu">
        <button onclick="openPanel()">LED Panel</button>
        <button onclick="openForm()">Formulář</button>
        <button onclick="logout()">Odhlásit</button>
    </div>

    <div class="card">
        <h3>Vítej v systému 🚍</h3>
        <p>Vyber si panel nebo formulář.</p>
    </div>

</div>

<script>
// USERS DB (localStorage)
let users = JSON.parse(localStorage.getItem("users") || "{}");

function register(){
    let u = user.value;
    let p = pass.value;

    if(!u || !p) return alert("Vyplň vše");

    users[u] = p;
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registrováno!");
}

function login(){
    let u = user.value;
    let p = pass.value;

    if(users[u] === p){
        loginBox.style.display="none";
        app.style.display="block";
    } else {
        alert("Špatné údaje");
    }
}

function logout(){
    location.reload();
}

function openPanel(){
    window.location.href = "panel.html";
}

function openForm(){
    window.open("https://docs.google.com/forms/d/e/1FAIpQLSf4YpFc2PNPb6iF_HiP1MaDgyyS1fI8Kt5uvmAneKRFk4ylYA/viewform?embedded=true");
}
</script>

</body>
</html>
