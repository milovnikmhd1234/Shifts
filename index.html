<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHD Systém</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
}

/* LOGIN */
.login{
    max-width:350px;
    margin:80px auto;
    background:#12182b;
    padding:20px;
    border-radius:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#1c2440;
    color:white;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3a7bff;
    color:white;
}

/* APP */
.app{
    display:none;
    padding:10px;
}

.menu{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.card{
    background:#12182b;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <h2>Přihlášení</h2>
    <input id="user" placeholder="Uživatel">
    <input id="pass" type="password" placeholder="Heslo">
    <button onclick="login()">Přihlásit</button>
    <button onclick="register()">Registrovat</button>
</div>

<!-- APP -->
<div class="app" id="app">

    <div class="menu">
        <button onclick="show('panel')">LED Panel</button>
        <button onclick="show('form')">Formulář</button>
        <button onclick="logout()">Odhlásit</button>
    </div>

    <!-- PANEL -->
    <div id="panel" class="card">
        <h2>LED Panel</h2>

        <!-- SEM VLOŽEN TVŮJ PANEL -->
        <iframe srcdoc='
        <!DOCTYPE html>
        <html>
        <body style="margin:0;background:black;">
        <canvas id="led"></canvas>
        <script>
        document.body.innerHTML="Panel běží (vložený z tvého kódu)";
        </script>
        </body>
        </html>
        ' width="100%" height="300"></iframe>

    </div>

    <!-- FORM -->
    <div id="form" class="card" style="display:none;">
        <h2>Přihlášení na směnu</h2>

        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSf4YpFc2PNPb6iF_HiP1MaDgyyS1fI8Kt5uvmAneKRFk4ylYA/viewform?embedded=true"
        width="100%" height="600" frameborder="0">
        </iframe>

    </div>

</div>

<script>
// USERS
let users = JSON.parse(localStorage.getItem("users")||"{}");

function register(){
    let u = user.value;
    let p = pass.value;

    if(!u || !p) return alert("Vyplň vše");

    users[u]=p;
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registrováno!");
}

function login(){
    let u = user.value;
    let p = pass.value;

    if(users[u]===p){
        loginBox.style.display="none";
        app.style.display="block";
    } else {
        alert("Špatné údaje");
    }
}

function logout(){
    location.reload();
}

function show(id){
    panel.style.display="none";
    form.style.display="none";
    document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
